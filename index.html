<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>読み込み中…</title></head><body><p style="font-family:sans-serif;padding:2rem">ページを読み込んでいます…</p><script>(async()=>{const files=['parts/part-01.txt','parts/part-02.txt','parts/part-03.txt','parts/part-04.txt','parts/part-05.txt','parts/part-06.txt','parts/part-07.txt','parts/part-08.txt'];const parts=await Promise.all(files.map(async f=>{const r=await fetch(f);if(!r.ok)throw new Error(f);return r.text()}));document.open();document.write(parts.join(''));document.close()})().catch(e=>{document.body.innerHTML='<p style="font-family:sans-serif;padding:2rem">ページを読み込めませんでした。</p>';console.error(e)});</script></body></html>
